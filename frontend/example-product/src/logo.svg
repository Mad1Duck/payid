<?xml version="1.0" encoding="UTF-8"?>
<svg width="512px" height="512px" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>PAY.ID Logo</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="grad">
            <stop stop-color="#00D084" offset="0%"></stop>
            <stop stop-color="#00A36C" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g id="logo" stroke="none" fill="none">
        <!-- Shield Background Glow -->
        <circle cx="256" cy="256" r="240" fill="#00D084" fill-opacity="0.05" />
        
        <!-- Modern Shield Path -->
        <path d="M256,40 L416,104 L416,248 C416,356 348,432 256,472 C164,432 96,356 96,248 L96,104 L256,40 Z" 
              stroke="url(#grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="#0B0F1A" fill-opacity="0.9"/>
              
        <!-- Locked Padlock Icon in the center -->
        <!-- Shackle -->
        <path d="M192,208 L192,176 C192,140.7 220.7,112 256,112 C291.3,112 320,140.7 320,176 L320,208" 
              stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
              
        <!-- Lock Body -->
        <rect x="176" y="208" width="160" height="120" rx="20" fill="url(#grad)" />
        
        <!-- Keyhole -->
        <path d="M256,250 L256,280" stroke="#0B0F1A" stroke-width="12" stroke-linecap="round"/>
        <circle cx="256" cy="246" r="10" fill="#0B0F1A"/>
    </g>
</svg>